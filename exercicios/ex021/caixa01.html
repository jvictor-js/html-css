<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;
            
            border: 10px solid cadetblue;
            
            padding: 30px;
            
            margin: 20px auto 40px auto;
            
            outline: 10px dashed blueviolet;
        }

        a {
            border-width: 10px;
            border-style: solid;
            border-color: cadetblue;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            padding-right: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="@">links são exemplos de caixas inline-level</a>, vamos ver se funcionou.</p>
</body>
</html>
