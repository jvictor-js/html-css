<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 2em;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color:crimson;
            text-decoration: underline;
        }

        a:active {
            color: darkviolet;
        }

        a::after {
            content: ' »';
        }

        a::before {
            content: '« ';
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li>Visite o meu: <a href="https://github.com/gustavoguanabara" target="_blank" rel="external">Repositório Github</a></li>
        <li>Visite o meu: <a href="https://youtube.com/cursoemvideo/" target="_blank" rel="external">Canal do YouTube</a></li>
        <li>Visite o meu: <a href="https://www.cursoemvideo.com" target="_blank" rel="external">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
